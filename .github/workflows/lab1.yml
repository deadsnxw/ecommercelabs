name: Lab 1 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Print .env
        run: cat .env

      - name: Create .env
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}" >> .env
          echo "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" >> .env
          echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Build and Start
        run: docker compose up -d

      - name: Debug env in container
        run: docker exec app printenv | grep -E "DB_|DATABASE|POSTGRES"

      - name: Debug containers
        if: ${{ always() }}
        run: docker compose logs backend --tail 50

      - name: Wait for Readiness
        run: |
          for i in {1..15}; do
            if curl -s localhost:5000/health; then
              echo "App is ready!"
              break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab1_test.sh
          ./tests/lab1_test.sh
