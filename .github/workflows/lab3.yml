name: Lab 3 Grading

on:
  push:
    branches: [lab03]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: lab3-cluster

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into KinD
        run: |
          docker pull ghcr.io/deadsnxw/ecommerce-app:latest
          kind load docker-image ghcr.io/deadsnxw/ecommerce-app:latest --name lab3-cluster

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Debug pod status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Pod description ==="
          kubectl describe pods
          echo "=== Pod logs ==="
          kubectl logs -l app=ecommerce-app --tail=20 || true

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh