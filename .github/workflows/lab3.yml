name: Lab 3 Grading

on:
  push:
    branches: [lab03]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: lab3-cluster

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load image into KinD
        run: |
          docker pull ghcr.io/deadsnxw/ecommerce-app:latest
          kind load docker-image ghcr.io/deadsnxw/ecommerce-app:latest --name lab3-cluster

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for PostgreSQL to be ready
        run: kubectl rollout status deployment/postgres --timeout=60s

      - name: Debug after 30s
        if: always()
        run: |
          sleep 30
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== App logs ==="
          kubectl logs -l app=ecommerce-app --tail=50 || true
          echo "=== Init container logs ==="
          kubectl logs -l app=ecommerce-app -c wait-for-postgres --tail=20 || true
          echo "=== Env in pod ==="
          POD=$(kubectl get pods -l app=ecommerce-app -o jsonpath='{.items[0].metadata.name}')
          kubectl exec $POD -- printenv | grep -E "DB_|PORT" || true

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
