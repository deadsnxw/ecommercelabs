name: Lab 3 Grading

on:
  push:
    branches: [lab03]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: lab3-cluster

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect image CMD
        run: |
          docker pull ghcr.io/deadsnxw/ecommerce-app:latest
          echo "=== CMD in image ==="
          docker inspect ghcr.io/deadsnxw/ecommerce-app:latest --format='{{json .Config.Cmd}}'
          echo "=== Entrypoint ==="
          docker inspect ghcr.io/deadsnxw/ecommerce-app:latest --format='{{json .Config.Entrypoint}}'
          echo "=== Test run ==="
          docker run --rm \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=test \
            -e DB_USER=test \
            -e DB_PASSWORD=test \
            ghcr.io/deadsnxw/ecommerce-app:latest \
            sh -c "echo 'Container works'" || true

      - name: Load image into KinD
        run: |
          kind load docker-image ghcr.io/deadsnxw/ecommerce-app:latest --name lab3-cluster

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for PostgreSQL to be ready
        run: kubectl rollout status deployment/postgres --timeout=60s

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
