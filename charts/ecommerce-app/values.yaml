replicaCount: 2

image:
  repository: ghcr.io/deadsnxw/ecommerce-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

config:
  dbHost: "postgres"
  dbPort: "5432"
  dbName: "ecommerce"
  port: "5000"
  nodeEnv: "production"
  corsOrigin: "http://localhost:3000"